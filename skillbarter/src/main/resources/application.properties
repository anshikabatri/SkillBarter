# Server
server.port=${SERVER_PORT:8082}


# DataSource - Supports both MySQL and PostgreSQL
# For local development (MySQL): Leave as default
# For Render/production (PostgreSQL): Use DATABASE_URL environment variable
spring.datasource.url=${DATABASE_URL:jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:skillbarter_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}



# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT (fill in your values)
jwt.secret=${JWT_SECRET:mySuperSecretKeyForSkillBarterApp12345}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Dev seed data (set false after testing if needed)
app.seed-data=${APP_SEED_DATA:true}

# Profile photo upload
app.upload-dir=${APP_UPLOAD_DIR:uploads}

# Password reset token expiry
app.password-reset.token-expiry-minutes=${APP_PASSWORD_RESET_TOKEN_EXPIRY_MINUTES:15}