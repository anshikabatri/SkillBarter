# Render profile (no external DB required)
server.port=${PORT:8080}

# Use file-based H2 DB in ephemeral disk (for demo/testing)
spring.datasource.url=jdbc:h2:file:./data/skillbarter;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

jwt.secret=${JWT_SECRET:mySuperSecretKeyForSkillBarterApp12345}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.seed-data=${APP_SEED_DATA:false}
app.upload-dir=${APP_UPLOAD_DIR:uploads}
app.password-reset.token-expiry-minutes=${APP_PASSWORD_RESET_TOKEN_EXPIRY_MINUTES:15}
